<!doctype html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>香りワークショップ_PC問_ワイヤーフレーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'Noto Sans JP'", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-[#f5f4f2] text-gray-800 dark:bg-gray-50">
  <div class="min-h-full">
    <header class="mx-auto w-full max-w-[1200px] px-3 pt-3 sm:px-5">
      <div class="h-7 rounded-lg border border-[#d8d3cd] bg-[#dedbd7]"></div>
      <div class="mt-2 flex gap-2">
        <div class="h-5 w-24 rounded-md bg-[#e7e2de]"></div>
        <div class="h-5 w-24 rounded-md bg-[#dbe1d6]"></div>
      </div>
    </header>
<!--ブラウザサイズは12：6.5想定-->
    <main class="mx-auto w-full max-w-[1200px] px-3 pb-3 pt-2 sm:px-5">
      <section class="grid gap-4 lg:grid-cols-[160px_minmax(0,1fr)_270px]">
        <aside class="space-y-3">
          <div class="h-10 rounded-md border border-[#d7a8a2] bg-[#ebe8e6]"></div>
          <div class="h-10 rounded-md border border-[#d7a8a2] bg-[#ebe8e6]"></div>
          <div class="h-10 rounded-md border border-[#d7a8a2] bg-[#ebe8e6]"></div>
          <div class="h-10 rounded-md border border-[#d9cab7] bg-[#efedeb]"></div>
          <div class="h-10 rounded-md border border-[#d9cab7] bg-[#efedeb]"></div>
        </aside>

        <section class="rounded-md border border-[#cdbeb1] bg-[#f4f2ef] px-4 py-3 sm:px-5">
          <h1 class="text-[34px] font-black tracking-[0.08em]">Q？？？？？？？</h1>
<!--固定パネル内で選択。3つの画像つき選択肢 + 中立ボタン2つで構成。-->

          <div class="mt-4 space-y-3">
            <button class="flex h-11 w-full items-center justify-center rounded border border-[#d2b9a8] bg-[#ece8e5] text-2xl font-bold">選択肢 A</button>
            <button class="flex h-11 w-full items-center justify-center rounded border border-[#c3cbbf] bg-[#dee3dc] text-2xl font-bold">選択肢 B</button>
            <button class="flex h-11 w-full items-center justify-center rounded border border-[#c4cdd8] bg-[#e3e9ef] text-2xl font-bold">選択肢 C</button>
          </div>

          <div class="mt-4 grid gap-3 sm:grid-cols-2">
            <button class="h-10 rounded border border-[#d2b9a8] bg-[#f3f1ef] text-sm">全部好き</button>
            <button class="h-10 rounded border border-[#d2b9a8] bg-[#f3f1ef] text-sm">この中にはない</button>
          </div>
        </section>

        <aside class="space-y-3">
          <div class="flex h-[245px] items-center justify-center rounded-[34px] border border-[#ccb9a6] bg-[#e8d5c0]">
            <!--店舗の雰囲気画像-->
          </div>
          <div class="rounded-2xl border border-[#a8b4a4] bg-[#b9c5b2] p-3">
            <h2 class="text-[30px] font-bold leading-none">豆知識</h2>
<!-- ランダムで20パターン程度の香水に関する豆知識が表示される。将来的な拡張要素。日にちに応じた豆知識も。 -->

          </div>
        </aside>
      </section>
    </main>

    <footer class="mx-auto w-full max-w-[1200px] px-3 pb-3 sm:px-5">
      <div class="grid gap-3 sm:grid-cols-[2fr_1fr]">
        <div class="h-12 rounded-xl bg-[#e4dfdc]"></div>
        <button class="h-12 rounded-xl bg-[#e4dfdc] text-sm text-gray-600">次のステップへ進む</button>
      </div>
    </footer>
  </div>
</body>
</html>
