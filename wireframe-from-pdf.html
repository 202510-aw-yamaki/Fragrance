<!doctype html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>香りワークショップ_PC問_ワイヤーフレーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'Noto Sans JP'", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }

    .frame {
      height: 100dvh;
      overflow: hidden;
      padding: 10px;
      background: #f5f4f2;
      display: grid;
      grid-template-rows: 7% 9% 70% 14%;
      gap: 10px;
    }

    .browser-bar {
      border-radius: 10px;
      background: #e2dfdb;
      border: 1px solid #ddd7cf;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }

    .steps {
      display: grid;
      grid-template-columns: 12% 12% 1fr;
      gap: 10px;
      align-items: center;
    }

    .step-btn {
      height: 100%;
      border-radius: 8px;
      border: 1px solid #d8cdc2;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main {
      display: grid;
      grid-template-columns: 19% 47% 34%;
      gap: 14px;
      min-height: 0;
    }

    .left-nav { display: grid; grid-template-rows: repeat(3, 17%); gap: 14px; align-content: start; }

    .left-item {
      border-radius: 7px;
      border: 1px solid #cfb8a8;
      background: #eef3ea;
      padding: 10px 14px;
      font-size: 30px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left-item.two { background: #f6efee; border-color: #d9a7a1; }
    .left-item.three { background: #edf2f8; border-color: #abc0d3; }

    .center {
      border: 1px solid #cdbeb1;
      border-radius: 6px;
      background: #f7f6f4;
      padding: 18px 20px 14px;
      display: grid;
      grid-template-rows: 12% 20% 20% 20% 16%;
      gap: 12px;
      min-height: 0;
    }

    .q-title { font-size: 46px; font-weight: 700; line-height: 1; color: #17324f; }
    .mobile-progress { display: none; }

    .choice {
      border: 1px solid #dbcfc3;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 700;
      color: #17324f;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .choice.a {
      background-image: linear-gradient(rgba(245, 241, 236, 0.72), rgba(245, 241, 236, 0.72)), url('https://images.unsplash.com/photo-1525310072745-f49212b5ac6d?auto=format&fit=crop&w=1200&q=60');
    }
    .choice.b { background: #dbe2da; }
    .choice.c { background: #dbe5ef; }

    .choice-bottom {
      display: grid;
      grid-template-columns: 5% 40% 10% 40% 5%;
      align-items: center;
    }

    .small-btn {
      height: 100%;
      border-radius: 6px;
      border: 1px solid #d5c4b5;
      background: #f5f3f0;
      font-size: 28px;
      color: #333;
    }

    .right {
      display: grid;
      grid-template-rows: 63% 37%;
      gap: 12px;
      min-height: 0;
    }

    .visual {
      border-radius: 48px;
      border: 1px solid #ccb9a6;
      background: #ebdac4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      line-height: 1.2;
      letter-spacing: 0.2em;
      text-align: center;
    }

    .tips {
      border-radius: 28px 28px 0 0;
      border: 1px solid #a2b09d;
      background: #a7b89f;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-size: 52px;
      font-weight: 500;
    }

    .bottom {
      display: grid;
      grid-template-columns: 4% 56% 4% 30% 6%;
      align-items: center;
    }

    .note-box,
    .next-btn {
      height: 72%;
      border-radius: 14px;
      background: #ece7e4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a4a4a;
      font-size: 38px;
    }

    @media (max-width: 1200px) {
      .left-item { font-size: 18px; }
      .q-title { font-size: 28px; }
      .choice { font-size: 34px; }
      .small-btn { font-size: 20px; }
      .visual { font-size: 36px; }
      .tips { font-size: 30px; }
      .note-box, .next-btn { font-size: 22px; }
    }

    @media (max-width: 900px) {
      .frame { grid-template-rows: 8% 9% 69% 14%; gap: 8px; padding: 8px; }
      .main { grid-template-columns: 20% 48% 32%; gap: 8px; }
      .steps { grid-template-columns: 18% 18% 1fr; }
    }

    @media (max-width: 640px) and (orientation: portrait) {
      .frame {
        grid-template-rows: 100%;
        padding: 6px;
        gap: 0;
      }
      .browser-bar,
      .steps,
      .left-nav,
      .right,
      .bottom {
        display: none;
      }
      .main {
        display: block;
        height: 100%;
      }
      .center {
        height: 100%;
        border-radius: 14px;
        padding: 14px 12px;
        grid-template-rows: auto auto repeat(5, 1fr);
        gap: 10px;
      }
      .q-title {
        font-size: 48px;
        text-align: center;
        line-height: 1.2;
      }
      .mobile-progress {
        display: block;
      }
      .choice {
        font-size: 30px;
      }
      .choice.a {
        background-image: none;
        background-color: #ece5df;
      }
      .choice-bottom {
        grid-template-columns: 0 1fr 0 1fr 0;
        gap: 10px;
      }
      .small-btn {
        font-size: 28px;
      }
    }
  </style>
</head>
<body class="h-full bg-[#f5f4f2] text-gray-900 dark:bg-gray-50">
  <div class="frame">
    <header class="browser-bar">
      <div class="h-2 w-2 rounded-full bg-[#d7b1a7]"></div>
      <div class="ml-2 h-2 w-2 rounded-full bg-[#d9ccc0]"></div>
      <div class="ml-2 h-2 w-2 rounded-full bg-[#b7c7b2]"></div>
    </header>

    <section class="steps">
      <div class="step-btn bg-[#eee6e6]">STEP1</div>
      <div class="step-btn bg-[#e1e8df]">STEP2</div>
      <div></div>
    </section>

    <main class="main">
      <aside class="left-nav">
        <div class="left-item">Q6 身につけた時の印象</div>
        <div class="left-item two">Q7 甘さの出方</div>
        <div class="left-item three">Q8 今日の仕上がり</div>
      </aside>

      <section class="center">
        <h1 class="q-title">好きな色は<br>何ですか？</h1>
        <div class="mobile-progress">
          <p class="text-center text-[20px] text-[#17324f]">3 / 8　残り5問です</p>
          <div class="mx-auto mt-2 h-3 w-[82%] rounded-full bg-[#e5e0da]">
            <div class="h-3 w-[37.5%] rounded-full bg-[#d6a8a0]"></div>
          </div>
        </div>
        <button class="choice a">やさしいピンク・ベージュ</button>
        <button class="choice b">白・水色・透明感</button>
        <button class="choice c">ブラウン・深いグリーン</button>
        <div class="choice-bottom">
          <div></div>
          <button class="small-btn">全部好き</button>
          <div></div>
          <button class="small-btn">この中にはない</button>
          <div></div>
        </div>
      </section>

      <aside class="right">
        <div class="visual">店<br>舗<br>の<br>雰<br>囲<br>気<br>画<br>像</div>
        <div class="tips">豆知識</div>
      </aside>
    </main>

    <footer class="bottom">
      <div></div>
      <div class="note-box">解答をもとにグラフを表示する</div>
      <div></div>
      <button class="next-btn">次のステップへ進む</button>
      <div></div>
    </footer>
  </div>
</body>
</html>
